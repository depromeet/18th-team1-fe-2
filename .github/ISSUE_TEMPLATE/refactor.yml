name: ♻️ Refactor
description: 코드 리팩토링
title: "[REFACTOR] "
labels: ["refactor"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 🎯 요약
      description: 리팩토링할 내용을 한 줄로 요약해주세요
      placeholder: 예) 인증 로직을 커스텀 훅으로 분리
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 💡 리팩토링 이유
      description: 왜 이 코드를 리팩토링하려고 하나요?
      placeholder: |
        - 코드 중복 제거
        - 가독성 개선
        - 성능 최적화
        - 유지보수성 향상
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📄 상세 설명
      description: 어떻게 리팩토링할 계획인가요?
      placeholder: 구체적인 리팩토링 방법을 설명해주세요
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 체크리스트
      description: 리팩토링 작업 목록
      value: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true
