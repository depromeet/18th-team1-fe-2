name: ✨ Feature
description: 새로운 기능 제안
title: "[FEAT] "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 🎯 요약
      description: 구현할 기능을 한 줄로 요약해주세요
      placeholder: 예) 사용자가 책을 검색할 수 있는 기능
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📄 상세 설명
      description: 기능에 대한 상세한 설명을 작성해주세요
      placeholder: |
        - 왜 이 기능이 필요한가요?
        - 어떻게 동작해야 하나요?
        - 참고할 만한 레퍼런스가 있나요?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 체크리스트
      description: 구현해야 할 작업 목록
      value: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true
