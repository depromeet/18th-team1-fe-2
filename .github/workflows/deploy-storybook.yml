name: Deploy Storybook

on:
  push:
    branches:
      - develop
    paths:
      # Storybook 설정
      - '.storybook/**'
      # 컴포넌트 및 스토리 파일 (디자인 토큰 포함)
      - 'src/shared/ui/**'
      # 앱 전역 스타일 (shared/ui/tokens.css를 import)
      - 'src/app/globals.css'
      # 의존성 변경 시 재빌드
      - 'package.json'
      - 'pnpm-lock.yaml'

# 연속된 push 이벤트가 발생할 때 이전 실행 중인 워크플로를 취소하고 최신 이벤트만 처리
concurrency:
  group: 'deploy-storybook'
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Storybook 정적 파일 빌드 & 아티팩트 업로드
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      # 빌드 결과물을 deploy job으로 전달
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Oracle Cloud 서버 배포 (빌드 성공 시에만 실행)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      # 빌드 결과물 다운로드
      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/

      # storybook-static/ 를 서버의 /opt/storybook/ 로 전송
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'storybook-static/*'
          target: '/opt/storybook'
          strip_components: 1
          rm: true

      # 서버에서 Docker 컨테이너로 정적 파일 서빙 (포트 6006)
      - name: Restart Storybook container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop storybook || true
            docker rm storybook || true

            docker run -d \
              --name storybook \
              --restart always \
              -p 6006:80 \
              -v /opt/storybook:/usr/share/nginx/html:ro \
              nginx:alpine

            docker image prune -f
